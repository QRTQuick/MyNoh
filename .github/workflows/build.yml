name: Build Installers
on:
  workflow_dispatch:
  push:
    branches: [main]
jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: Mynoh-windows
          - os: ubuntu-latest
            artifact: Mynoh-linux
          - os: macos-latest
            artifact: Mynoh-macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.13'}
      - run: python -m pip install -U pip
      - run: pip install -e '.[dev]'
      - run: python scripts/build.py
      - name: Package Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist/Mynoh/* -DestinationPath Mynoh-windows-portable.zip
      - name: Package Linux
        if: runner.os == 'Linux'
        run: tar -czf Mynoh-linux.tar.gz -C dist Mynoh
      - name: Package macOS
        if: runner.os == 'macOS'
        run: ditto -c -k --sequesterRsrc --keepParent dist/Mynoh Mynoh-macos.zip
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            *.zip
            *.tar.gz
            dist/**
