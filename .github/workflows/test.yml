name: Test
on: [push, pull_request]
jobs:
  test:
    strategy:
      matrix: {os: [ubuntu-latest, windows-latest, macos-latest]}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.13'}
      - run: python -m pip install -U pip
      - run: pip install -e '.[dev]'
      - run: pytest -q
