name: Lint
on: [push, pull_request]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.13'}
      - run: python -m pip install -U pip
      - run: pip install -e '.[dev]'
      - run: black --check .
      - run: isort --check-only .
      - run: ruff check .
      - run: flake8 .
